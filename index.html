<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Click Game</title>
<style>
  body { font-family: Arial; text-align: center; background:#f5f5f5; }

  #avatarContainer {
    width:150px;
    height:150px;
    margin:20px auto;
    border-radius:50%;
    overflow:hidden;
    background:#ddd;
  }

  #avatar {
    width:100%;
    height:100%;
    object-fit:cover;
    object-position:center;
  }

  #tray { display:flex; justify-content:center; gap:20px; margin-top:20px; }
  .item { width:80px; height:80px; cursor:pointer; transition: transform 0.3s; }
</style>
</head>
<body>

<h2>Upload your friend's photo</h2>
<input type="file" id="upload" accept="image/*" capture="environment">

<div id="avatarContainer">
  <img id="avatar" src="">
</div>

<div id="tray"></div>

<script>
const items = [
  {name:'胡萝卜', img:'https://cdn-icons-png.flaticon.com/512/2909/2909767.png'},
  {name:'纸巾', img:'https://cdn-icons-png.flaticon.com/512/4149/4149673.png'},
  {name:'米奇', img:'https://cdn-icons-png.flaticon.com/512/616/616408.png'},
  {name:'电视机', img:'https://cdn-icons-png.flaticon.com/512/1041/1041916.png'},
  {name:'iPad', img:'https://cdn-icons-png.flaticon.com/512/888/888857.png'}
];

let currentTarget = null;
let speed = 1000;

const tray = document.getElementById('tray');

function renderItems(){
  tray.innerHTML = '';
  items.forEach(item=>{
    const img = document.createElement('img');
    img.src = item.img;
    img.className = 'item';
    img.onclick = ()=>handleClick(item.name);
    tray.appendChild(img);
  });
}

function speak(text){
  const utter = new SpeechSynthesisUtterance(text);
  utter.lang = 'zh-CN';
  speechSynthesis.speak(utter);
}

function nextRound(){
  const rand = items[Math.floor(Math.random()*items.length)];
  currentTarget = rand.name;
  speak(rand.name);
}

function shuffle(){
  const imgs = document.querySelectorAll('.item');
  imgs.forEach(img=>{
    img.style.transform = `translate(${Math.random()*100-50}px, ${Math.random()*100-50}px)`;
  });
}

function handleClick(name){
  if(name === currentTarget){
    speak('真棒');
    speed = Math.max(300, speed - 100);
    setTimeout(nextRound, 800);
  }else{
    speak('再试一次');
    let interval = setInterval(shuffle, 100);
    setTimeout(()=>{
      clearInterval(interval);
      nextRound();
    }, speed);
  }
}

const upload = document.getElementById('upload');
upload.onchange = e=>{
  const file = e.target.files[0];
  if(!file) return;
  const reader = new FileReader();
  reader.onload = ()=>{
    document.getElementById('avatar').src = reader.result;
  }
  reader.readAsDataURL(file);
}

renderItems();
setTimeout(nextRound,1000);
</script>

</body>
</html>
